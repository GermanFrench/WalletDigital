spring:
  application:
    name: wallet-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walletdb}
    username: ${DB_USERNAME:german}
    password: ${DB_PASSWORD:Golondrina86@}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.security: INFO
    com.tuusuario.wallet: INFO

security:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

app:
  mail:
    from: ${MAIL_FROM:no-reply@wallet.local}
  password-reset:
    frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173}
    expose-token-in-response: ${PASSWORD_RESET_EXPOSE_TOKEN_IN_RESPONSE:true}

