spring:
  application:
    name: wallet-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walletdb}
    username: ${DB_USERNAME:wallet_user}
    password: ${DB_PASSWORD:wallet_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.security: INFO
    com.tuusuario.wallet: INFO

security:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

