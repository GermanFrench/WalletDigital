spring:
  datasource:
    url: jdbc:h2:mem:walletdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
security:
  jwt:
    secret: 0123456789012345678901234567890123456789012345678901234567890123
    expiration-minutes: 60
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info

